name: Release

on:
  push:
    tags:
      - "v*"

# Only this workflow needs write access, and only for publishing releases.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    runs-on: windows-latest
    # Tags from forks should never publish under this repo.
    if: github.repository == 'andresleecom/speech'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Run tests
        run: python -m pytest -q
      - name: Build Windows installer
        shell: pwsh
        run: .\scripts\build_windows.ps1 -Python python
      - name: Smoke packaged executable
        shell: pwsh
        run: |
          $exe = "dist\Speech\Speech.exe"
          if (!(Test-Path $exe)) { throw "Packaged executable not found." }
          $versionProcess = Start-Process -FilePath $exe -ArgumentList "--version" -Wait -PassThru
          if ($versionProcess.ExitCode -ne 0) { throw "Version smoke test failed with exit code $($versionProcess.ExitCode)." }
          $diagnosticsProcess = Start-Process -FilePath $exe -ArgumentList "--diagnostics" -Wait -PassThru
          if ($diagnosticsProcess.ExitCode -ne 0) { throw "Diagnostics smoke test failed with exit code $($diagnosticsProcess.ExitCode)." }
      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $assets = @(
            Get-ChildItem -Path dist\installer -Filter "Speech-Setup*.exe"
            Get-ChildItem -Path dist\installer -Filter "Speech-Setup*.exe.sha256"
          ) | Sort-Object Name
          if ($assets.Count -lt 4) { throw "Expected stable and versioned installer assets." }
          $assetPaths = @($assets | ForEach-Object { $_.FullName })
          gh release create $env:TAG_NAME @assetPaths --title $env:TAG_NAME --generate-notes

  macos:
    runs-on: macos-latest
    # The windows job creates the release; this one appends the DMG to it.
    needs: windows
    if: github.repository == 'andresleecom/speech'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Build macOS app and DMG
        run: bash scripts/build_macos.sh python
      - name: Smoke packaged app
        run: |
          BIN="dist/Speech.app/Contents/MacOS/Speech"
          test -x "$BIN" || { echo "Packaged app not found."; exit 1; }
          "$BIN" --version
      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" dist/installer/Speech*.dmg dist/installer/Speech*.dmg.sha256 --clobber
