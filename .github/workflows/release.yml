name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# This workflow is the only one allowed to publish release assets.
permissions:
  contents: write

# A newer main commit supersedes an incomplete build, so an older commit cannot
# become the latest release after a newer one has already been published.
concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  prepare:
    if: github.repository == 'andresleecom/speech'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: version
        shell: bash
        run: |
          base_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [[ ! "$base_version" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "pyproject.toml must contain a two- or three-component base version." >&2
            exit 1
          fi
          build_version="${base_version}.${GITHUB_RUN_NUMBER}"
          echo "version=$build_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$build_version" >> "$GITHUB_OUTPUT"

  linux:
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      SPEECH_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Linux build and runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 \
            gir1.2-ayatanaappindicator3-0.1 \
            gir1.2-gtk-3.0 \
            libcairo2-dev \
            libgirepository1.0-dev \
            libportaudio2 \
            pkg-config \
            xauth \
            xclip \
            xvfb
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Build Linux packages
        run: bash scripts/build_linux.sh python
      - name: Smoke Linux packages
        shell: bash
        run: |
          BIN="dist/Speech/Speech"
          test -x "$BIN" || { echo "Packaged executable not found."; exit 1; }
          test "$("$BIN" --version)" = "$SPEECH_VERSION"
          "$BIN" --diagnostics
          test "$(APPIMAGE_EXTRACT_AND_RUN=1 dist/installer/Speech.AppImage --version)" = "$SPEECH_VERSION"
          test "$(dpkg-deb --field dist/installer/Speech.deb Version)" = "$SPEECH_VERSION"
          test "$(dpkg-deb --field dist/installer/Speech.deb Architecture)" = "amd64"
          dpkg-deb --field dist/installer/Speech.deb Depends | grep -qw xclip
          dpkg-deb --field dist/installer/Speech.deb Depends | grep -qw libayatana-appindicator3-1
          dpkg-deb --field dist/installer/Speech.deb Depends | grep -q 'libc6 (>= '
          cd dist/installer
          sha256sum --check Speech*.sha256
          cd ../..
          tray_state="$(mktemp -d)"
          set +e
          timeout 8s dbus-run-session -- xvfb-run -a env \
            APPIMAGE_EXTRACT_AND_RUN=1 \
            HF_HUB_OFFLINE=1 \
            PYSTRAY_BACKEND=appindicator \
            WINWHISPER_APPDATA_DIR="$tray_state" \
            dist/installer/Speech.AppImage
          tray_status=$?
          set -e
          test "$tray_status" -eq 124
          grep -q "Hotkey listener started" "$tray_state/logs/app.log"
      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            dist/installer/Speech*.AppImage*
            dist/installer/Speech*.deb*
          if-no-files-found: error
          retention-days: 1

  windows:
    needs: prepare
    runs-on: windows-latest
    env:
      SPEECH_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Run tests
        run: python -m pytest -q
      - name: Build Windows installer
        shell: pwsh
        run: .\scripts\build_windows.ps1 -Python python
      - name: Smoke packaged executable
        shell: pwsh
        run: |
          $exe = "dist\Speech\Speech.exe"
          if (!(Test-Path $exe)) { throw "Packaged executable not found." }
          $versionProcess = Start-Process -FilePath $exe -ArgumentList "--version" -Wait -PassThru
          if ($versionProcess.ExitCode -ne 0) { throw "Version smoke test failed with exit code $($versionProcess.ExitCode)." }
          $diagnosticsProcess = Start-Process -FilePath $exe -ArgumentList "--diagnostics" -Wait -PassThru
          if ($diagnosticsProcess.ExitCode -ne 0) { throw "Diagnostics smoke test failed with exit code $($diagnosticsProcess.ExitCode)." }
      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/installer/Speech-Setup*.exe*
          if-no-files-found: error
          retention-days: 1

  macos:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: arm64
            runner: macos-15
          - architecture: intel
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    env:
      SPEECH_VERSION: ${{ needs.prepare.outputs.version }}
      SPEECH_MACOS_ARCH: ${{ matrix.architecture }}
      SPEECH_CODESIGN_IDENTITY: "Developer ID Application: Launcher S de RL de CV (XB92PXFQ2L)"
      SPEECH_NOTARIZE: "1"
      SPEECH_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      SPEECH_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Import Developer ID credentials
        env:
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_NOTARY_KEY_P8: ${{ secrets.APPLE_NOTARY_KEY_P8 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          for name in \
            MACOS_DEVELOPER_ID_P12_BASE64 \
            MACOS_DEVELOPER_ID_P12_PASSWORD \
            APPLE_NOTARY_KEY_P8 \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_ISSUER_ID
          do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          CERT_PATH="$RUNNER_TEMP/speech-developer-id.p12"
          NOTARY_KEY_PATH="$RUNNER_TEMP/speech-notary-key.p8"
          KEYCHAIN_PATH="$RUNNER_TEMP/speech-signing-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT-${{ matrix.architecture }}.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$MACOS_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          printf '%s' "$APPLE_NOTARY_KEY_P8" > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"

          {
            echo "SPEECH_NOTARY_KEY=$NOTARY_KEY_PATH"
            echo "SPEECH_CODESIGN_KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "SPEECH_CODESIGN_P12_PATH=$CERT_PATH"
          } >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$MACOS_DEVELOPER_ID_P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep -F "Developer ID Application: Launcher S de RL de CV (XB92PXFQ2L)" \
            >/dev/null
      - name: Build macOS app and DMG
        run: bash scripts/build_macos.sh python
      - name: Smoke packaged app
        run: |
          BIN="dist/Speech.app/Contents/MacOS/Speech"
          test -x "$BIN" || { echo "Packaged app not found."; exit 1; }
          test "$("$BIN" --version)" = "$SPEECH_VERSION"
          "$BIN" --diagnostics
      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.architecture }}-release
          path: |
            dist/installer/*.dmg
            dist/installer/*.dmg.sha256
          if-no-files-found: error
          retention-days: 1
      - name: Cleanup signing credentials
        if: always()
        run: |
          set +e
          KEYCHAIN_PATH="${SPEECH_CODESIGN_KEYCHAIN_PATH:-}"
          P12_PATH="${SPEECH_CODESIGN_P12_PATH:-}"
          P8_PATH="${SPEECH_NOTARY_KEY:-}"
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          fi
          rm -f "$P12_PATH" "$P8_PATH"
          # Prefer fixed RUNNER_TEMP names if env was never exported (fail-before-export).
          rm -f \
            "$RUNNER_TEMP/speech-developer-id.p12" \
            "$RUNNER_TEMP/speech-notary-key.p8"
          # Best-effort: remove any speech-signing keychains left under RUNNER_TEMP.
          for kc in "$RUNNER_TEMP"/speech-signing-*.keychain-db; do
            [ -e "$kc" ] || continue
            security delete-keychain "$kc" >/dev/null 2>&1 || true
            rm -f "$kc"
          done

  publish:
    needs: [prepare, linux, windows, macos]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      BUILD_VERSION: ${{ needs.prepare.outputs.version }}
      TAG_NAME: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Verify release asset set
        shell: bash
        run: |
          expected=(
            "Speech-$BUILD_VERSION.AppImage"
            "Speech-$BUILD_VERSION.AppImage.sha256"
            "Speech.AppImage"
            "Speech.AppImage.sha256"
            "Speech-$BUILD_VERSION.deb"
            "Speech-$BUILD_VERSION.deb.sha256"
            "Speech.deb"
            "Speech.deb.sha256"
            "Speech-Setup-$BUILD_VERSION.exe"
            "Speech-Setup-$BUILD_VERSION.exe.sha256"
            "Speech-Setup.exe"
            "Speech-Setup.exe.sha256"
            "Speech-$BUILD_VERSION.dmg"
            "Speech-$BUILD_VERSION.dmg.sha256"
            "Speech.dmg"
            "Speech.dmg.sha256"
            "Speech-$BUILD_VERSION-intel.dmg"
            "Speech-$BUILD_VERSION-intel.dmg.sha256"
            "Speech-intel.dmg"
            "Speech-intel.dmg.sha256"
          )
          for asset in "${expected[@]}"; do
            test -s "release-assets/$asset" || {
              echo "Missing release asset: $asset" >&2
              exit 1
            }
          done
      - name: Publish GitHub release
        shell: bash
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG_NAME" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Speech $BUILD_VERSION" \
              --generate-notes
          fi
